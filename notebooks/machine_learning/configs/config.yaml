data:
  # Path to CSV/parquet file with tile features
  dataframe_path: "data/processed_csv/combined_wsi_data.csv"
  
  # Label column name
  label_column: "label"
  
  # Case ID column
  case_id_column: "case_id"
  
  # Feature selection strategy
  feature_selection:
    strategy: "auto"
    exclude_columns: []
  
pca:
  n_components: null
  variance_threshold: 0.95
  batch_size: 50000
  use_incremental: true

aggregation: 
  functions: ['mean', 'std']

train:
  val_size: 0.2 
  random_state: 8340
  stratify: true
  patient_level_split: true
  
imbalance:
  strategies:
    - "class_weight"
    - "smote"
    - "combined"
  
  smote:
    k_neighbors: 5
    sampling_strategy: "auto"
  
models:
  logistic_regression:
    solver: "saga"
    max_iter: 1000
    n_jobs: -1
    penalty: "l2"
    C: 1.0  
    
  random_forest:
    n_estimators: 200
    max_depth: 20
    min_samples_split: 10
    min_samples_leaf: 4
    n_jobs: -1
    random_state: 42

    
  xgboost:
    n_estimators: 100        
    max_depth: 3             
    learning_rate: 0.05       
    subsample: 0.7            
    colsample_bytree: 0.7     
    
    reg_alpha: 1.0            
    reg_lambda: 1.0          
    min_child_weight: 10       
    gamma: 1.0               
    
    tree_method: "hist"
    n_jobs: -1
    random_state: 8340
    
  mlp:
    hidden_layers: [64, 32] 
    activation: "relu"
    solver: "adam"
    alpha: 0.01 
    batch_size: 512
    learning_rate: "adaptive"
    max_iter: 300
    early_stopping: true
    validation_fraction: 0.2
    n_iter_no_change: 15  
    random_state: 8340

hpc:
  n_cores: 32
  memory: "128GB"
  time_limit: "24:00:00"
  partition: "compute"
  
output:
  base_dir: "results"
  models_dir: "results/models"
  figures_dir: "results/figures"
  metrics_dir: "results/metrics"
  data_dir: "data/processed"